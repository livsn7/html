<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas em html 5</title>
</head>
<body>
    <h1>tabelas em html 5</h1>
    <table border="10">
        <thead>
            <tr>
                <th>nome do aluno</th>
                <th>disciplina</th>
                <th>nota final</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Livia linda</td>
                <td>matematica</td>
                <td>10.0</td>
            </tr>

            <tr>
                <td>liv bonita</td>
                <td>fisica</td>
                <td>10.0</td>
            </tr>

            <tr>
                <td>livia super legal maravilhosa</td>
                <td>fisica quantica</td>
                <td>10.0</td>
            </tr>
        </tbody>

        <tfoot>
            <tr>
                <td colspan="2"><strong>media da turma</strong></td>
                <td><strong>10.0</strong></td>
            </tr>
        </tfoot>
    </table>
</body>
</html>
